<script>
  var FALLBACK = [
    {title:"뇌 피질 인터페이싱 전자 텐트 전극 — 시린지펌프 TYD01-01", summary:"주입 모듈에서 주입 속도를 정밀 제어", date:"2026-07-02", url:"/setups/brain-electrode-tyd01.html", model_focus:"TYD01-01 시린지", journal:"Nature Electronics", tags:["바이오","뇌공학"]},
    {title:"혈관내 카테터 헤파린 코팅 — 연동펌프 BT101 L", summary:"실리콘 튜브 폐루프 순환 회로 구성", date:"2026-06-30", url:"/setups/catheter-heparin-bt101.html", model_focus:"BT101 L 연동", journal:"Nature Communications", tags:["의료","소재"]},
    {title:"심장 체외 관류(ESHP) — 연동펌프 BT101L", summary:"정상 체온 체외 심장 관류 회로 순환", date:"2026-06-25", url:"/setups/heart-eshp-bt101l.html", model_focus:"BT101L 연동", journal:"Front. Cardiovasc. Med.", tags:["의료","관류"]},

    {title:"연속 CO₂ 포집 — 마그네틱펌프 CT3001F", summary:"anolyte·catholyte 전해액 순환", date:"2026-06-28", url:"/setups/co2-capture-ct3001f.html", model_focus:"CT3001F 마그네틱", journal:"Nature Communications", tags:["에너지","탄소포집"]},
    {title:"1500℃ 튜브퍼니스 가스 분위기 자동 제어 — Alicat MFC", summary:"온도 스케줄에 맞춘 가스 유량 제어", date:"2026-06-15", url:"/setups/alicat-mfc-tubefurnace.html", model_focus:"Alicat MFC", journal:"도입 사례", tags:["재료","열처리"]},

  ];
  var SECTION_MAP = {
    'brain-electrode-tyd01':'bio','catheter-heparin-bt101':'bio','heart-eshp-bt101l':'bio',
    'damo-recirculation-bt600s':'env','nitrification-ph-bq50s':'env',
    'co2-capture-ct3001f':'energy','alicat-mfc-tubefurnace':'energy','leadfluid-bt101l-plating':'energy'
  };
  function sectionOf(url){
    var slug = (url||'').split('/').pop().replace(/\.html$/,'');
    return SECTION_MAP[slug] || 'energy';
  }
  function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;'); }
  function cardHtml(p){
    var cat = (p.tags||[]).slice(0,2).map(function(t){ return '#'+t; }).join(' ');
    return '<a class="st-row" href="'+p.url+'">'+
      '<div class="st-badge">'+esc(p.journal||'')+'</div>'+
      '<div class="st-bd">'+
        '<div class="st-cat">'+esc(cat)+'</div>'+
        '<div class="st-t">'+esc(p.title)+'</div>'+
        '<div class="st-sum">셋업 — <b>'+esc(p.model_focus||'')+'</b> · '+esc(p.summary||'')+'</div>'+
        '<div class="st-date">'+esc(p.date||'')+' · '+esc(p.journal||'')+'</div>'+
      '</div></a>';
  }
  function render(items){
    items.sort(function(a,b){ return (b.date||'').localeCompare(a.date||''); });
    document.getElementById('stCount').innerHTML = '셋업 <b>'+items.length+'</b> · 연구 분야 3';
    var groups = { bio:[], env:[], energy:[] };
    items.forEach(function(p){ (groups[sectionOf(p.url)] || groups.energy).push(p); });
    ['bio','env','energy'].forEach(function(k){
      var el = document.getElementById('sec-'+k);
      if(!el) return;
      el.innerHTML = groups[k].length
        ? groups[k].map(cardHtml).join('')
        : '<div class="st-empty">준비 중입니다.</div>';
    });
    document.getElementById('stAnswer').innerHTML = '<b>논문이 답한 셋업을 연구 분야별로 정리했습니다 — 바이오·의료, 환경·수처리, 에너지·재료·열처리.</b> 각 셋업은 어떤 LeadFluid 펌프를 어떤 구성으로 썼는지 보여주고, 그 판단의 근거로 논문·저널·모델·DOI를 함께 인용합니다.';
  }
  fetch('/_build/posts.json').then(function(r){return r.json();}).then(function(d){
    var setups = (d.posts||[]).filter(function(p){ return p.type === 'setup'; });
    render(setups.length ? setups : FALLBACK);
  }).catch(function(){ render(FALLBACK); });
</script>
