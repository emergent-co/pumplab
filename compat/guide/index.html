<style>

  .d-liquid{background:#E7F0FB;color:#1E3A5F}
  .d-gas{background:#E6F5EE;color:#1A6E56}
  .d-vac{background:#F0EAF8;color:#5B3E8E}

<style>
  .g-reqbar-wrap{margin:10px auto 0}
  .g-reqbar{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;background:var(--green-bg,#eef6f0);border:1px solid var(--line);border-radius:12px;padding:16px 18px;font-size:14.5px;color:var(--ink)}
  .g-reqbtn{background:var(--green);color:#fff;border:0;border-radius:9px;padding:11px 16px;font-size:14.5px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap}
  .g-reqbtn:hover{background:var(--green-dk,#0b6b4f)}
  .g-empty .g-reqbtn{margin-top:12px}
  .g-modal{display:none;position:fixed;inset:0;background:rgba(10,20,30,.5);z-index:100;align-items:center;justify-content:center;padding:20px}

  .g-lab textarea:focus,.g-lab input:focus{outline:none;border-color:var(--green)}
  .g-reqsubmit{width:100%;background:var(--green);color:#fff;border:0;border-radius:9px;padding:13px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px;font-family:inherit}
  .g-reqsubmit:hover{background:var(--green-dk,#0b6b4f)}
</style>
<section class="gwrap g-reqbar-wrap">
  <div class="g-reqbar">
    <div>찾으시는 실험 셋업 가이드가 없나요? <b>필요한 주제를 요청</b>하시면 정리해 드립니다.</div>
    <button type="button" class="g-reqbtn" onclick="openGReq()">실험가이드 요청하기 →</button>
  </div>
</section>

<div class="g-modal" id="gReqModal" onclick="if(event.target===this)closeGReq()">
  <div class="g-modal-box">
    <button class="g-modal-x" type="button" onclick="closeGReq()" aria-label="닫기">×</button>
    <form id="gReqForm" action="https://formspree.io/f/mnjkzppj" method="POST">
      <input type="hidden" name="form_type" value="guide_request">
      <h3 class="g-modal-h">실험가이드 요청</h3>
      <p class="g-modal-sub">어떤 실험 셋업이 궁금하신가요? 주제를 남겨주시면 가이드로 정리해 회신드립니다.</p>
      <label class="g-lab">찾는 주제·질문 *<textarea name="topic" id="gReqTopic" rows="3" required placeholder="예: 튜브퍼니스 가스 분위기를 MFC로 제어하려면?"></textarea></label>
      <label class="g-lab">이메일 *<input type="email" name="email" required placeholder="you@lab.ac.kr"></label>
      <label class="g-lab">소속(선택)<input type="text" name="org" placeholder="○○대학교 ○○연구실"></label>
      <button type="submit" class="g-reqsubmit">요청 보내기</button>
    </form>
    <div id="gReqDone" style="display:none">
      <h3 class="g-modal-h">요청 감사합니다!</h3>
      <p class="g-modal-sub">남겨주신 주제를 검토해 실험 셋업 가이드로 정리한 뒤 이메일로 회신드리겠습니다.</p>
    </div>
  </div>
</div>

<div id="pumplab-footer"></div>
<script src="/assets/site.js" defer></script>
<script>
(function(){
  var CARDS = [
    {q:"기체 유량, MFC와 로타미터 중 무엇으로 제어하나?", h:"질량 기준 자동 제어(MFC) 비교", u:"/gas/", d:"기체", k:"mfc 로타미터 질량유량계 기체 유량 비교", cmp:true},
    {q:"튜브퍼니스 가스 분위기는 어떻게 제어하나?", h:"근거: Alicat MFC + 온도 스케줄 연동", u:"/setups/alicat-mfc-tubefurnace.html", d:"기체", k:"튜브퍼니스 가스 분위기 alicat mfc cvd 온도 연동"},
    {q:"여러 MFC를 동시에 제어·혼합비를 맞추려면?", h:"다중 MFC RS485 동기 제어", u:"/gas/", d:"기체", k:"다중 mfc 동기 혼합비 rs485 가스"},
    {q:"ALICAT 질량유량계, 무엇이 좋은가?", h:"초고속 응답·다기체 보정 비교", u:"/alicat/", d:"기체", k:"alicat mfc 응답속도 다기체 보정", cmp:true},
    {q:"오일 회전식 vs 다이아프램 진공펌프, 뭘 골라야 하나?", h:"진공도·오염·내화학 비교", u:"/vacuum/", d:"진공", k:"진공 오일 회전식 다이아프램 비교 선택", cmp:true},
    {q:"용매를 다룰 때 어떤 진공펌프가 안전한가?", h:"무오일·내화학 다이아프램", u:"/vacuum/#diaphragm", d:"진공", k:"용매 무오일 다이아프램 내화학 진공"},
    {q:"삼흥에너지 튜브퍼니스 열처리 셋업은?", h:"온도 스케줄+가스 유량 연동", u:"/sh-scientific/", d:"진공", k:"삼흥에너지 튜브퍼니스 열처리 전기로 온도"}
  ];

  var DOMAIN_CLASS = {"액체":"d-liquid","기체":"d-gas","진공":"d-vac","자동화":"d-auto"};

  function esc(s){ return (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

  var grid = document.getElementById("gGrid");
  var countEl = document.getElementById("gCount");
  var searchEl = document.getElementById("gSearch");
  var filtersEl = document.getElementById("gFilters");
  var state = { d:"전체", q:"" };
  (function initFromURL(){
    var p = new URLSearchParams(location.search);
    var q = p.get('q'), d = p.get('d');
    if(q){ state.q = q; if(searchEl) searchEl.value = q; }
    if(d){
      var btn = filtersEl.querySelector('.g-fbtn[data-d="'+d+'"]');
      if(btn){ Array.prototype.forEach.call(filtersEl.querySelectorAll('.g-fbtn'), function(b){ b.classList.remove('active'); }); btn.classList.add('active'); state.d = d; }
    }
  })();

  function cardHTML(c){
    var dcls = DOMAIN_CLASS[c.d] || "d-liquid";
    var cmp = c.cmp ? '<span class="g-cmp">비교</span>' : '';
    return '<a class="g-card" href="'+c.u+'">'+
      '<div class="g-tags"><span class="g-dot '+dcls+'">'+esc(c.d)+'</span>'+cmp+'</div>'+
      '<div class="g-q">'+esc(c.q)+'</div>'+
      '<div class="g-hint">'+esc(c.h)+'</div>'+
      '<div class="g-more">가이드 보기 →</div>'+
    '</a>';
  }

  function render(){
    var q = state.q.trim().toLowerCase();
    var list = CARDS.filter(function(c){
      var okD = state.d === "전체" || c.d === state.d;
      if(!okD) return false;
      if(!q) return true;
      var hay = (c.q + " " + c.h + " " + c.k + " " + c.d).toLowerCase();
      return hay.indexOf(q) !== -1;
    });
    if(list.length === 0){
      grid.innerHTML = '';
      countEl.innerHTML = '';
      var qtxt = state.q ? '‘'+esc(state.q)+'’에 맞는' : '해당 조건의';
      grid.insertAdjacentHTML('beforeend', '<div class="g-empty" style="grid-column:1/-1">'+qtxt+' 가이드가 아직 없습니다.<br><button type="button" class="g-reqbtn" onclick="openGReq()">이 주제로 실험가이드 요청하기 →</button></div>');
      return;
    }
    countEl.innerHTML = '가이드 <b>'+list.length+'</b>개';
    grid.innerHTML = list.map(cardHTML).join('');
  }

  filtersEl.addEventListener('click', function(e){
    var btn = e.target.closest('.g-fbtn');
    if(!btn) return;
    Array.prototype.forEach.call(filtersEl.querySelectorAll('.g-fbtn'), function(b){ b.classList.remove('active'); });
    btn.classList.add('active');
    state.d = btn.getAttribute('data-d');
    render();
  });

  searchEl.addEventListener('input', function(){
    state.q = searchEl.value;
    render();
  });

  window.openGReq = function(){
    var m = document.getElementById('gReqModal'); if(!m) return;
    var t = document.getElementById('gReqTopic'); if(t && !t.value) t.value = state.q || '';
    m.classList.add('open');
    if(typeof gtag==='function') gtag('event','guide_request_open');
  };
  window.closeGReq = function(){ var m = document.getElementById('gReqModal'); if(m) m.classList.remove('open'); };
  var gReqForm = document.getElementById('gReqForm');
  if(gReqForm){ gReqForm.addEventListener('submit', async function(e){
    e.preventDefault();
    var f = e.target, btn = f.querySelector('.g-reqsubmit'), orig = btn.textContent;
    btn.disabled = true; btn.textContent = '전송 중…';
    try{
      var res = await fetch(f.action, { method:'POST', headers:{'Accept':'application/json'}, body:new FormData(f) });
      if(res.ok){ f.style.display='none'; document.getElementById('gReqDone').style.display='block'; if(typeof gtag==='function') gtag('event','guide_request_submit'); }
      else { btn.disabled=false; btn.textContent=orig; alert('전송에 실패했습니다. 잠시 후 다시 시도해 주세요.'); }
    }catch(_){ btn.disabled=false; btn.textContent=orig; alert('네트워크 오류가 발생했습니다.'); }
  }); }

  render();
})();
</script>
</body>
</html>
