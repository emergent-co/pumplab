<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="BT101 ex vivo catheter closed-loop setup">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eaf1f9"/>
      <stop offset="100%" stop-color="#f5f9f7"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
      <feOffset dx="0" dy="2" result="offset"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a6e56"/>
    </marker>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- 배경 점 패턴 -->
  <g fill="#c7d4e3" opacity="0.5">
    <circle cx="60" cy="60" r="1.5"/><circle cx="120" cy="60" r="1.5"/><circle cx="180" cy="60" r="1.5"/>
    <circle cx="60" cy="120" r="1.5"/><circle cx="180" cy="120" r="1.5"/>
    <circle cx="720" cy="60" r="1.5"/><circle cx="660" cy="60" r="1.5"/>
    <circle cx="720" cy="340" r="1.5"/><circle cx="660" cy="340" r="1.5"/>
  </g>

  <!-- Reservoir (left) -->
  <g filter="url(#soft)">
    <rect x="60" y="160" width="120" height="100" rx="10" fill="#ffffff" stroke="#0a2540" stroke-width="2"/>
    <rect x="68" y="195" width="104" height="60" rx="4" fill="#dbe7f5"/>
    <text x="120" y="155" text-anchor="middle" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" fill="#0a2540">Reservoir</text>
    <text x="120" y="180" text-anchor="middle" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="11" fill="#5a6779">Saline (USP-grade)</text>
  </g>

  <!-- BT101 Pump (center) -->
  <g filter="url(#soft)">
    <rect x="320" y="140" width="160" height="140" rx="10" fill="#0a2540"/>
    <circle cx="400" cy="210" r="38" fill="#ffffff" opacity="0.08"/>
    <circle cx="400" cy="210" r="28" fill="none" stroke="#1a6e56" stroke-width="3"/>
    <!-- 롤러 3개 -->
    <circle cx="400" cy="182" r="6" fill="#1a6e56"/>
    <circle cx="424" cy="224" r="6" fill="#1a6e56"/>
    <circle cx="376" cy="224" r="6" fill="#1a6e56"/>
    <text x="400" y="160" text-anchor="middle" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="11" font-weight="700" fill="#ffffff" letter-spacing="0.5">BT101 + YZ15</text>
    <text x="400" y="265" text-anchor="middle" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="10" fill="#a9b8cc">38.4 mL/min</text>
  </g>

  <!-- Catheter sample (right) -->
  <g filter="url(#soft)">
    <rect x="620" y="160" width="120" height="100" rx="10" fill="#ffffff" stroke="#0a2540" stroke-width="2"/>
    <rect x="635" y="200" width="90" height="20" rx="10" fill="#1a6e56"/>
    <rect x="640" y="205" width="80" height="10" rx="5" fill="#dff0e7"/>
    <text x="680" y="155" text-anchor="middle" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="13" font-weight="700" fill="#0a2540">Catheter 5cm</text>
    <text x="680" y="245" text-anchor="middle" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="11" fill="#5a6779">Heparin coating</text>
  </g>

  <!-- Tubing (top: reservoir → pump) -->
  <path d="M 180 200 Q 250 200 320 200" fill="none" stroke="#1a6e56" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="250" y="190" text-anchor="middle" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="10" fill="#5a6779">실리콘 ID 3mm</text>

  <!-- Tubing (top: pump → catheter) -->
  <path d="M 480 200 Q 550 200 620 200" fill="none" stroke="#1a6e56" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <text x="550" y="190" text-anchor="middle" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="10" fill="#5a6779">실리콘 ID 3mm</text>

  <!-- Closed loop (bottom return) -->
  <path d="M 680 260 L 680 330 L 120 330 L 120 260" fill="none" stroke="#1a6e56" stroke-width="6" stroke-linecap="round" stroke-dasharray="0" marker-end="url(#arrow)"/>
  <text x="400" y="350" text-anchor="middle" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="11" fill="#1a6e56" font-weight="700">Closed Loop · 폐쇄 회로</text>

  <!-- Title overlay -->
  <text x="40" y="40" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="11" font-weight="700" fill="#1a6e56" letter-spacing="2">PUMP SETUP</text>
  <text x="40" y="62" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="16" font-weight="800" fill="#0a2540">정맥 카테터 ex vivo 시험</text>
  <text x="40" y="80" font-family="-apple-system,'Apple SD Gothic Neo',sans-serif" font-size="11" fill="#5a6779">Nature Communications · 2024</text>
</svg>
