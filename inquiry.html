<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>견적 문의 — Cellab</title>
<link rel="canonical" href="https://cellab.kr/inquiry.html">
<meta name="description" content="Cellab 정량펌프·소모품 견적 문의. 셀렙이 직접 답변합니다.">
<meta name="google-site-verification" content="Rmsvu2bCzPOi66nb9epKw-gbrb07Hyem6hM5uNu71ss" />
<meta name="naver-site-verification" content="388fb33540d49f5adf6912da9cc3f089163002b6" />

<script async src="https://www.googletagmanager.com/gtag/js?id=G-CN3E3PVQVD"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-CN3E3PVQVD');

<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#0a2540;--teal:#1a6e56;--text:#1a2332;--muted:#5a6779;--border:#e3e8ef;--bg:#f7f9fc;
  }
  html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Apple SD Gothic Neo','Malgun Gothic',sans-serif;color:var(--text);background:var(--bg);line-height:1.55}
  a{color:var(--teal);text-decoration:none}
  .container{max-width:720px;margin:0 auto;padding:32px 20px}

  /* 헤더 */
  .head{padding:18px 0;border-bottom:1px solid var(--border);margin-bottom:24px}
  .head a{font-size:21px;font-weight:800;color:var(--navy);letter-spacing:-.02em}
  .head a span{color:var(--teal)}
  .head .sub{font-size:12px;color:var(--muted);margin-top:2px}

  /* 진행 표시 */
  .progress{display:flex;gap:8px;margin-bottom:20px;font-size:12px;color:var(--muted)}
  .progress .step{padding:6px 12px;border-radius:14px;background:#fff;border:1px solid var(--border)}
  .progress .step.active{background:var(--teal);color:#fff;border-color:var(--teal);font-weight:700}

  h1{font-size:24px;font-weight:800;color:var(--navy);letter-spacing:-.02em;margin-bottom:8px}
  .lead{font-size:13px;color:var(--muted);margin-bottom:20px}

  /* 폼 */
  .form{background:#fff;border:1px solid var(--border);border-radius:10px;padding:24px}

  /* Step 1 — 부품 리스트 */
  .cat-group{margin-bottom:20px}
  .cat-name{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.05em;margin-bottom:8px;text-transform:uppercase}
  .item{display:flex;align-items:center;gap:12px;padding:10px 12px;border:1px solid var(--border);border-radius:6px;margin-bottom:6px;transition:all .15s;background:#fff}
  .item:hover{border-color:var(--teal);background:#f5f9f7}
  .item input[type=checkbox]{width:16px;height:16px;accent-color:var(--teal);flex-shrink:0;cursor:pointer}
  .item .info{flex:1;min-width:0}
  .item .info .name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:2px}
  .item .info .spec{font-size:11.5px;color:var(--muted);line-height:1.4}
  .item .qty{display:flex;align-items:center;gap:4px;flex-shrink:0}
  .item .qty label{font-size:11px;color:var(--muted)}
  .item .qty input{width:54px;padding:5px 7px;border:1px solid var(--border);border-radius:4px;font:inherit;font-size:13px;text-align:center}
  .item.checked{border-color:var(--teal);background:#f5f9f7}

  /* Step 2 — 연락처 */
  .row{margin-bottom:14px}
  .row label{display:block;font-size:13px;font-weight:700;color:var(--navy);margin-bottom:6px}
  .row .req{color:#b94545;margin-left:3px}
  .row input[type=text],.row input[type=email],.row select,.row textarea{
    width:100%;padding:9px 11px;border:1px solid var(--border);border-radius:6px;font:inherit;color:var(--text);background:#fff;outline:none;
  }
  .row input:focus,.row select:focus,.row textarea:focus{border-color:var(--teal)}
  .row textarea{min-height:88px;resize:vertical}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.grid{grid-template-columns:1fr}}

  /* 선택된 부품 요약 (Step 2) */
  .summary{background:#f5f9f7;border:1px solid var(--teal);border-radius:6px;padding:12px;margin-bottom:18px}
  .summary .title{font-size:11px;font-weight:700;color:var(--teal);letter-spacing:.05em;margin-bottom:6px;text-transform:uppercase}
  .summary ul{list-style:none;font-size:13px;color:var(--text)}
  .summary li{padding:3px 0}
  .summary .empty{color:var(--muted);font-size:12px}

  /* 버튼 */
  .btn{padding:11px 18px;border:1px solid var(--border);border-radius:6px;background:#fff;color:var(--text);font:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:all .15s}
  .btn:hover{border-color:var(--teal);color:var(--teal)}
  .btn-primary{background:var(--teal);color:#fff;border-color:var(--teal)}
  .btn-primary:hover{background:#155b48;color:#fff}
  .btn-row{display:flex;justify-content:space-between;gap:8px;margin-top:18px}
  .btn-full{width:100%}

  .err{color:#b94545;font-size:12px;margin-top:6px;display:none}
  .err.show{display:block}

  /* 푸터 */
  .foot{margin-top:32px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);text-align:center}
  .foot a{margin:0 6px}
</style>
</head>
<body>

<div class="container">
  <div class="head">
    <a href="/index.html"><span>Cellab</span> 셀렙</a>
    <div class="sub">정량펌프·소모품 한국 공식 총판</div>
  </div>

  <h1>견적 문의</h1>
  <p class="lead" id="lead">필요한 부품을 선택하고 수량을 입력하세요.</p>

  <div class="progress">
    <span class="step active" id="prog1">1. 부품 선택</span>
    <span class="step" id="prog2">2. 연락처</span>
  </div>

  <form id="inquiryForm" action="https://formspree.io/f/mqendaqe" method="POST">

    <!-- Step 1 — 부품 선택 -->
    <div class="form" id="step1Section">
      <div id="itemsList">
        <p style="color:var(--muted);font-size:13px">불러오는 중...</p>
      </div>
      <div class="btn-row">
        <span></span>
        <button type="button" class="btn btn-primary" onclick="goStep2()">견적문의 보내기 →</button>
      </div>
      <div class="err" id="step1Err">최소 1개 이상의 부품을 선택해 주세요.</div>
    </div>

    <!-- Step 2 — 연락처 -->
    <div class="form" id="step2Section" style="display:none">

      <div class="summary">
        <div class="title">선택한 부품</div>
        <ul id="summaryList"><li class="empty">선택 없음</li></ul>
      </div>

      <input type="hidden" name="items_selected" id="itemsSelected">

      <div class="grid">
        <div class="row">
          <label>회사·연구실명 <span class="req">*</span></label>
          <input type="text" name="org" required>
        </div>
        <div class="row">
          <label>담당자명 <span class="req">*</span></label>
          <input type="text" name="name" required>
        </div>
      </div>

      <div class="grid">
        <div class="row">
          <label>이메일 <span class="req">*</span></label>
          <input type="email" name="email" required>
        </div>
        <div class="row">
          <label>연락처</label>
          <input type="text" name="phone" placeholder="선택">
        </div>
      </div>

      <div class="row">
        <label>응용 분야</label>
        <select name="application">
          <option value="">선택</option>
          <option value="세포배양">세포배양</option>
          <option value="HPLC·분석">HPLC·분석</option>
          <option value="마이크로플루이딕">마이크로플루이딕</option>
          <option value="카테터·의료기기">카테터·의료기기</option>
          <option value="바이오리액터·발효">바이오리액터·발효</option>
          <option value="오가노이드·관류">오가노이드·관류</option>
          <option value="기타">기타</option>
        </select>
      </div>

      <div class="row">
        <label>추가 문의 사항</label>
        <textarea name="message" placeholder="셋업 조건·납기 희망일·기타 요청 등"></textarea>
      </div>

      <div class="btn-row">
        <button type="button" class="btn" onclick="goStep1()">← 이전</button>
        <button type="submit" class="btn btn-primary">견적 문의 보내기</button>
      </div>
    </div>

  </form>

  <div class="foot">
    <a href="/index.html">홈</a> · <a href="/pump.html">정량펌프</a> · <a href="/tubing.html">튜브</a> · <a href="/syringe.html">시린지</a>
  </div>
</div>

<script>
const SPEC_LABELS = {
  pump: ['시리즈','유량','회전수·무게','용도'],
  pumphead: ['시리즈','채널','유량','호환튜브'],
  tubing: ['재질','내경','외경','길이'],
  syringe: ['시리즈','채널','시린지 범위','용도'],
  fitting: ['종류','사이즈','재질','용도'],
  other: ['종류','스펙1','스펙2','스펙3'],
};

const CAT_NAMES = {
  pump: '정량펌프',
  pumphead: '펌프헤드',
  tubing: '튜브',
  syringe: '시린지',
  fitting: '피팅',
  other: '기타',
};

let allProducts = [];

async function loadProducts() {
  try {
    const res = await fetch('_build/products.json', {cache:'no-store'});
    const data = await res.json();
    allProducts = data.products || [];
    renderItems();
  } catch (e) {
    document.getElementById('itemsList').innerHTML = '<p style="color:#b94545;font-size:13px">제품 목록을 불러올 수 없습니다. 새로고침 시도해 주세요.</p>';
  }
}

function renderItems() {
  // URL parameter로 prefilled — items=BT101S,YZ15,...
  const p = new URLSearchParams(location.search);
  const presetIds = (p.get('items') || '').split(',').map(s=>s.trim()).filter(Boolean);
  const presetMap = {};
  presetIds.forEach(id => { presetMap[id] = true; });

  // 카테고리별 그룹
  const groups = {};
  allProducts.forEach(prod => {
    if (prod.visible === false) return;
    const cat = prod.category || 'other';
    if (!groups[cat]) groups[cat] = [];
    groups[cat].push(prod);
  });

  const order = ['pump','pumphead','tubing','syringe','fitting','other'];
  let html = '';
  order.forEach(cat => {
    if (!groups[cat]) return;
    html += `<div class="cat-group"><div class="cat-name">${CAT_NAMES[cat]||cat}</div>`;
    groups[cat].forEach(prod => {
      const isChecked = presetMap[prod.id] || presetMap[prod.code] ? 'checked' : '';
      const checkedClass = isChecked ? ' checked' : '';
      const labels = SPEC_LABELS[cat] || [];
      const specBits = [prod.spec1, prod.spec2, prod.spec3, prod.spec4]
        .filter(Boolean).slice(0,2).join(' · ');
      html += `
        <label class="item${checkedClass}" data-id="${prod.id}">
          <input type="checkbox" name="item_${prod.id}" value="${prod.code||prod.id}" ${isChecked} onchange="toggleItem(this)">
          <div class="info">
            <div class="name">${prod.name||prod.code||prod.id}</div>
            <div class="spec">${specBits||''}</div>
          </div>
          <div class="qty">
            <label>수량</label>
            <input type="number" name="qty_${prod.id}" min="1" value="1">
          </div>
        </label>
      `;
    });
    html += `</div>`;
  });
  document.getElementById('itemsList').innerHTML = html || '<p style="color:var(--muted);font-size:13px">제품이 없습니다.</p>';
}

function toggleItem(cb) {
  const item = cb.closest('.item');
  if (cb.checked) item.classList.add('checked');
  else item.classList.remove('checked');
}

function getSelected() {
  const items = [];
  document.querySelectorAll('.item input[type=checkbox]:checked').forEach(cb => {
    const item = cb.closest('.item');
    const name = item.querySelector('.name').textContent;
    const id = item.dataset.id;
    const qty = item.querySelector('input[type=number]').value || '1';
    items.push({id, name, qty});
  });
  return items;
}

function goStep2() {
  const selected = getSelected();
  if (selected.length === 0) {
    document.getElementById('step1Err').classList.add('show');
    return;
  }
  document.getElementById('step1Err').classList.remove('show');

  // 요약 렌더
  const sumList = document.getElementById('summaryList');
  sumList.innerHTML = selected.map(s => `<li>• ${s.name} <span style="color:var(--muted)">× ${s.qty}</span></li>`).join('');

  // hidden input에 요약 텍스트
  const txt = selected.map(s => `${s.name} × ${s.qty}`).join('\n');
  document.getElementById('itemsSelected').value = txt;

  // 단계 전환
  document.getElementById('step1Section').style.display = 'none';
  document.getElementById('step2Section').style.display = 'block';
  document.getElementById('prog1').classList.remove('active');
  document.getElementById('prog2').classList.add('active');
  document.getElementById('lead').textContent = '연락처 정보를 입력해 주세요.';
  window.scrollTo(0,0);
}

function goStep1() {
  document.getElementById('step1Section').style.display = 'block';
  document.getElementById('step2Section').style.display = 'none';
  document.getElementById('prog2').classList.remove('active');
  document.getElementById('prog1').classList.add('active');
  document.getElementById('lead').textContent = '필요한 부품을 선택하고 수량을 입력하세요.';
  window.scrollTo(0,0);
}

// 폼 제출 GA4 이벤트
document.getElementById('inquiryForm').addEventListener('submit', function(){
  if (typeof gtag === 'function') {
    gtag('event', 'inquiry_submit', {
      items: document.getElementById('itemsSelected').value
    });
  }
});

// 시작
loadProducts();
</script>

</body>
</html>
