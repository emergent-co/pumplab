<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>이동 중… — Cellab</title>
<meta http-equiv="refresh" content="0; url=tubing.html">
<link rel="canonical" href="https://cellab.kr/tubing.html">
<script>
  // ?cat=X 파라미터가 있으면 X.html로, 없으면 tubing.html로 이동
  (function(){
    var params = new URLSearchParams(location.search);
    var cat = (params.get('cat') || 'tubing').toLowerCase();
    var q = params.get('q');
    var allowed = ['tubing','syringe','pumphead','fitting','other'];
    if (allowed.indexOf(cat) === -1) cat = 'tubing';
    var target = cat + '.html' + (q ? '?q=' + encodeURIComponent(q) : '');
    location.replace(target);
  })();
</script>
</head>
<body>
<p>이동 중입니다… 자동으로 이동하지 않으면 <a href="tubing.html">여기를 클릭</a>하세요.</p>
</body>
</html>
