name: Build category pages on products.json change

on:
  push:
    paths:
      - '_build/products.json'
      - '_build/categories.json'
      - '_build/template.html'
      - '_build/build.py'
      - '_build/partial_*.html'

# build.py 결과를 다시 push할 권한
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run build.py
        run: python _build/build.py

      - name: Commit + push if changed (skip ci to avoid loop)
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pump.html tubing.html syringe.html pumphead.html fitting.html other.html sitemap.xml || true
          if ! git diff --staged --quiet; then
            git commit -m 'Auto-build category pages [skip ci]'
            git push
          else
            echo "No changes to commit"
          fi
